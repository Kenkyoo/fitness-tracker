services:
  - type: web
    name: fitness-tracker
    runtime: python
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --no-input && python manage.py migrate"
    startCommand: "gunicorn fitness_project.wsgi:application"
    envVars:
      - key: SECRET_KEY
        generateValue: true # Render genera un valor seguro automáticamente
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: fitness-db
          property: connectionString

databases:
  - name: fitness-db
    databaseName: fitness_db
    plan: free
